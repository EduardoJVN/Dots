# =============================================================================
# ATAJOS DE TECLADO
# =============================================================================

# --- 🔊 CONTROL DE HARDWARE (Multimedia y Capturas) ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Capturas de pantalla rápidas vía Hyprshot
bind = , PRINT, exec, hyprshot -m region
bind = SHIFT, PRINT, exec, hyprshot -m output
bind = CTRL, PRINT, exec, hyprshot -m window

# --- 🚀 LANZADORES DE APLICACIONES ---
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod, TAB, exec, rofi -show window
bind = $mainMod SHIFT, W, exec, waypaper

# Apagar pantalla por software
bind = $mainMod, Escape, exec, sleep 1 && hyprctl dispatch dpms off

# --- 🛠️ GESTIÓN DE VENTANAS Y SESIÓN ---
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit,
bind = $mainMod, O, exec, hyprlock
bind = $mainMod, X, exec, hyprlock
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating,
bind = $mainMod, V, centerwindow,

# --- 📋 GESTOR DEL PORTAPAPELES (CLIPHIST) ---
bind = $mainMod, P, exec, cliphist list | rofi -dmenu -p "Portapapeles" | cliphist decode | wl-copy
bind = $mainMod SHIFT, P, exec, cliphist wipe && notify-send "Portapapeles" "Historial purgado por seguridad"

# --- 🎯 NAVEGACIÓN Y FOCO ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- 📦 ORGANIZACIÓN DE VENTANAS ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d