# =============================================================================
# APARIENCIA VISUAL & DISEÑO
# =============================================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
    }
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1

    animation = windows, 1, 3, easeOutQuint, popin 80%
    animation = windowsMove, 1, 3, easeOutQuint
    animation = fade, 1, 2, easeOutQuint
    animation = workspaces, 1, 3, easeOutQuint, slide
}