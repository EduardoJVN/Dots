# =============================================================================
# APARIENCIA VISUAL & DISEÑO
# =============================================================================
general {
    gaps_in  = 5,   #  Espacio entre ventanas adyacentes
    gaps_out = 10,  #  Espacio entre las ventanas y los bordes del monitor
    border_size = 2 #  Grosor del borde de las ventanas
    resize_on_border = true #    Permite estirar ventanas clickeando en el borde
    layout = dwindle
}

decoration {
    rounding       = 8
    rounding_power = 2
    #Change transparency of focused and unfocused windows
    active_opacity   = 1.0
    inactive_opacity = 1.0

    # shadow {
    #     enabled      = true
    #     range        = 4
    #     render_power = 3
    #     color        = 0xee1a1a1a
    # }

    blur {
        enabled   = true
        size      = 5
        passes    = 2
        vibrancy  = 0.1696
    }
}

animations {
    enabled = true
    # bezier = easeOutQuint, 0.23, 1, 0.32, 1


    # -------------------------------------------------------------------------
    # 📈 CURVAS DE ANIMACIÓN (Bézier y Springs)
    # -------------------------------------------------------------------------
    # Sintaxis Bézier: bezier = nombre, x1, y1, x2, y2
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    # Sintaxis Spring (Física): En el .conf se define usando la función spring() en la animación
    # Guardamos los parámetros numéricos de tu "easy" (mass, stiffness, dampening):
    # easy_spring = 1.00 71.26 15.83

    # -------------------------------------------------------------------------
    # 🎬 DECLARACIÓN DE ANIMACIONES
    # -------------------------------------------------------------------------
    # Sintaxis: animation = objeto, habilitado(1/0), velocidad, curva, [estilo]

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    
    # Animaciones con física de resorte (aquí inyectamos las variables de tu 'easy' spring)
    # animation = windows, 1, 4.79, spring 1 71.26 15.83
    # animation = windowsIn, 1, 4.1, spring 1 71.26 15.83, popin 87%
    
    # Animaciones estándar
    animation = windowsMove, 1, 3, easeOutQuint
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, slide
    animation = workspacesIn, 1, 1.21, almostLinear, slide
    animation = workspacesOut, 1, 1.94, almostLinear, slide
    animation = zoomFactor, 1, 7, quick


    animation = windows, 1, 3, easeOutQuint, popin 80%
    # animation = windowsMove, 1, 3, easeOutQuint
    # animation = fade, 1, 2, easeOutQuint
    # animation = workspaces, 1, 3, easeOutQuint, slide
}