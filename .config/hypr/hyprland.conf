# =============================================================================
# Hyprland Modular Configuration (Format: .conf)
# =============================================================================

# Desactivar el aviso amarillo de archivo autogenerado
autogenerated = 0

# Importación de módulos en orden de dependencia
source = ~/.config/hypr/modules/system.conf
source = ~/.config/hypr/modules/applications.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/appearance.conf
source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/modules/windowrules.conf
source = ~/.config/hypr/modules/bindings.conf
source = ~/.config/hypr/modules/workspaces.conf
