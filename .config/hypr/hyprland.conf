# =============================================================================
# CONFIGURACIÓN DE HARDWARE & MONITORES
# =============================================================================

# Configuración del monitor Ultrawide ASUS 34" a 165Hz
monitor=DP-1, 3440x1440@165, 0x0, 1, bitdepth, 10
# monitor=DP-1, 3440x1440@165, 0x0, 1s
# Le avisa al motor de renderizado de Wayland que habilite el soporte HDR
#env = ENABLE_HDR,1
#env = AQ_DRM_DEVICES,/dev/dri/card0
# Forzar a las apps a usar Wayland en lugar de X11 sobre NVIDIA
#env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Parámetros críticos para el driver propietario de NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = NVD_BACKEND,direct
#env = AQ_NO_MODIFIERS,1

misc {
    # VRR/Freesync desactivado. El monitor ASUS VG34VQL3A presenta ligeras 
    # variaciones de brillo en escritorio cuando VRR está activo.
    # 0= apagado 1 = Habilitado, 2 = Habilitado solo en pantalla completa
    vrr = 2
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
opengl {
    # Esto maneja el desgarro de pantalla y sincronización con NVIDIA
    nvidia_anti_flicker = true
}

cursor {
    # Soluciona problemas de parpadeo del puntero comunes con drivers de NVIDIA
    no_hardware_cursors = true
}

# Configuración flotante para el control de Audio
windowrule = float 1, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = size 600 400, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = move 65% 5%, match:class ^(org\.pulseaudio\.pavucontrol)$

# =============================================================================
# DEFINICIÓN DE VARIABLES DE APLICACIONES (Sustitución rápida)
# =============================================================================
$mainMod = SUPER
$terminal = wezterm
$menu = rofi -show drun
$fileManager = dolphin
# $browser = brave # Descomentar y cambiar si querés asignar un navegador técnico

# =============================================================================
# AUTOSTART (Servicios en segundo plano que inician con el sistema)
# =============================================================================
exec-once = waybar                                            # Barra de estado superior
exec-once = swaync                                            # Centro de notificaciones
exec-once = awww-daemon & sleep 0.2 && ~/wallpapers_loop.sh & # Gestor de fondos de pantalla
exec-once = hypridle                                          # Demonio de gestión de inactividad (bloqueo)
exec-once = /usr/lib/polkit-kde-authentication-agent-1        # Agente de autenticación Polkit (KDE/CachyOS)

# Daemons de escucha para capturar el historial de copiado de forma segura
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# =============================================================================
# APARIENCIA VISUAL & DISEÑO
# =============================================================================
general {
    gaps_in = 5               # Espacio entre ventanas adyacentes
    gaps_out = 10             # Espacio entre las ventanas y los bordes del monitor
    border_size = 2           # Grosor del borde de las ventanas
    resize_on_border = true   # Permite estirar ventanas clickeando en el borde
    layout = dwindle          # Sistema de mosaico automático (estilo árbol binario)
}

decoration {
    rounding = 8              # Bordes redondeados sutiles y profesionales

    blur {
        enabled = true
        size = 5
        passes = 2
    }
}

animations {
    enabled = true
    # Curva de aceleración limpia y rápida (Workstation de desarrollo)
    bezier = easeOutQuint, 0.23, 1, 0.32, 1

    animation = windows, 1, 3, easeOutQuint, popin 80%
    animation = windowsMove, 1, 3, easeOutQuint
    animation = fade, 1, 2, easeOutQuint
    animation = workspaces, 1, 3, easeOutQuint, slide
}

# =============================================================================
# DISPOSITIVOS DE ENTRADA (Teclado y Ratón)
# =============================================================================
input {
    kb_layout = us            # Distribución de teclado estándar estadounidense
    follow_mouse = 1          # El foco de la ventana sigue el movimiento del ratón

    touchpad {
        natural_scroll = true
    }
}

# =============================================================================
# ATAJOS DE TECLADO (MAPA DE TECLAS)
# =============================================================================

# --- 🔊 CONTROL DE HARDWARE (Multimedia y Capturas) ---
# [binde] repite la acción al mantener presionado (ideal para perillas de volumen)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Capturas de pantalla rápidas vía Hyprshot (Guardado automático en ~/Pictures)
bind = , PRINT, exec, hyprshot -m region             # ImprPant solo: Captura área seleccionada
bind = SHIFT, PRINT, exec, hyprshot -m output        # Shift + ImprPant: Pantalla completa
bind = CTRL, PRINT, exec, hyprshot -m window         # Ctrl + ImprPant: Captura la ventana activa

# --- 🚀 LANZADORES DE APLICACIONES ---
bind = $mainMod, RETURN, exec, $terminal             # Super + Enter: Abre terminal WezTerm
bind = $mainMod, E, exec, $fileManager               # Super + E: Abre explorador Dolphin
bind = $mainMod, SPACE, exec, $menu                     # Super + Espacio: Lanzador de Apps Spotlight (Rofi)
bind = $mainMod, R, exec, rofi -show run                # Super + R: Lanzador de comandos crudos en terminal
bind = $mainMod, TAB, exec, rofi -show window           # Super + Tab: Cambiador rápido entre ventanas abiertas
bind = $mainMod SHIFT, W, exec, waypaper             # Super + Shift + W: Cambiar fondo de pantalla

#Apagar la pantalla por software con Super + escape
bind = $mainMod, Escape, exec, sleep 1 && hyprctl dispatch dpms off

# --- 🛠️ GESTIÓN DE VENTANAS Y SESIÓN ---
bind = $mainMod, Q, killactive                        # Super + Q: Cierra la ventana actual
bind = $mainMod, M, exit,                             # Super + Shift + M: Cierra sesión de Hyprland por completo
bind = $mainMod, O, exec, hyprlock                   # Super + L: Bloquea la pantalla de inmediato
bind = $mainMod, X, exec, hyprlock                   # Super + L: Bloquea la pantalla de inmediato
bind = $mainMod, F, fullscreen                       # Super + F: Alterna pantalla completa en la ventana activa

# Gestión Avanzada de Flotantes (Optimizado para monitor Ultrawide de 34")
bind = $mainMod, V, togglefloating,                  # Super + V: Convierte ventana en flotante
# bind = $mainMod, V, resizeactive, exact 2400 1000cd
bind = $mainMod, V, centerwindow,                    # Super + V: Automáticamente la centra en el monitor

# --- 📋 GESTOR DEL PORTAPAPELES (CLIPHIST) ---
bind = $mainMod, P, exec, cliphist list | rofi -dmenu -p "Portapapeles" | cliphist decode | wl-copy
bind = $mainMod SHIFT, P, exec, cliphist wipe && notify-send "Portapapeles" "Historial purgado por seguridad"

# --- 🎯 NAVEGACIÓN Y FOCO (Moverse entre ventanas) ---
# bind = $mainMod, H, movefocus, l                  # Super + H: Foco a la izquierda
# bind = $mainMod, L, movefocus, r                  # Super + L: Foco a la derecha
# bind = $mainMod, K, movefocus, u                  # Super + K: Foco arriba
# bind = $mainMod, J, movefocus, d                  # Super + J: Foco abajo

bind = $mainMod, left, movefocus, l                  # Super + Flecha Izquierda: Foco a la izquierda
bind = $mainMod, right, movefocus, r                 # Super + Flecha Derecha: Foco a la derecha
bind = $mainMod, up, movefocus, u                    # Super + Flecha Arriba: Foco arriba
bind = $mainMod, down, movefocus, d                  # Super + Flecha Abajo: Foco abajo

# --- 📦 ORGANIZACIÓN DE VENTANAS (Mover ventanas dentro del mosaico) ---
# bind = $mainMod SHIFT, H, movewindow, l              # Super + Shift + H: Mueve ventana a la izquierda
# bind = $mainMod SHIFT, L, movewindow, r              # Super + Shift + L: Mueve ventana a la derecha
# bind = $mainMod SHIFT, K, movewindow, u              # Super + Shift + K: Mueve ventana hacia arriba
# bind = $mainMod SHIFT, J, movewindow, d              # Super + Shift + J: Mueve ventana hacia abajo

bind = $mainMod SHIFT, left, movewindow, l           # Super + Shift + Flecha Izquierda: Mueve ventana a la izquierda
bind = $mainMod SHIFT, right, movewindow, r          # Super + Shift + Flecha Derecha: Mueve ventana a la derecha
bind = $mainMod SHIFT, up, movewindow, u             # Super + Shift + Flecha Arriba: Mueve ventana hacia arriba
bind = $mainMod SHIFT, down, movewindow, d           # Super + Shift + Flecha Abajo: Mueve ventana hacia abajo

# --- 📐 REDIMENSIONAR VENTANAS (Exclusivo con flechas) ---
# Al presionar Super + Flechas, estirás o achicás la ventana activa
# binde = $mainMod, left,  resizeactive, -30 0
# binde = $mainMod, right, resizeactive, 30 0
# binde = $mainMod, up,    resizeactive, 0 -30
# binde = $mainMod, down,  resizeactive, 0 30

# --- 🗂️ CAMBIO DE ÁREAS DE TRABAJO (Workspaces 1 al 10) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- 🚚 TRASLADO DE VENTANAS A OTROS WORKSPACES ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
